<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scooby-Doo Character Selector</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fff5e6;
        }

        h1 {
            color: #ff6600;
        }

        select {
            font-size: 18px;
            margin: 20px;
            padding: 5px;
        }

        img {
            width: 300px;
            height: 300px;
            border: 2px solid #333;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Scooby-Doo Character Selector</h1>

    <select id="characterSelect">
        <!-- Options will be filled dynamically -->
    </select>

    <br>
    <img id="characterImage" src="images/Scooby-Doo.jpg" alt="Scooby-Doo">

    <script>
        // Array of Scooby-Doo characters
        const characters = ["Scooby-Doo", "Shaggy", "Fred"];

        // Get references to select box and image
        const selectBox = document.getElementById("characterSelect");
        const characterImage = document.getElementById("characterImage");

        // Fill the select box with character options
        characters.forEach(character => {
            const option = document.createElement("option");
            option.value = character; // Must match image file name
            option.text = character;
            selectBox.appendChild(option);
        });

        // Change image when selection changes
        selectBox.addEventListener("change", () => {
            const selected = selectBox.value;
            characterImage.src = `images/${selected}.jpg`;
            characterImage.alt = selected;
        });
    </script>

</body>
</html>
